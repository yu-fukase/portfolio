<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#55265D;
  --surface:#612E6A;
  --surface-2:#6E3A77;
  --line:rgba(255,250,245,.18);
  --text:#FFFAF5;
  --muted:rgba(255,250,245,.64);
  --accent:#50B890;
  --accent-soft:rgba(80,184,144,.16);
  --on-accent:#14352A;
  --display:'Bricolage Grotesque','Noto Sans JP',sans-serif;
  --body:'Inter','Noto Sans JP',sans-serif;
  --maxw:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
.page{display:none}
.page.active{display:block}

/* ===== ヒーロー ===== */
.hero{max-width:var(--maxw);margin:0 auto;padding:clamp(72px,12vw,140px) 24px clamp(40px,6vw,64px)}
.eyebrow{font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:22px}
.hero h1{font-family:var(--display);font-weight:800;font-size:clamp(44px,8.5vw,104px);line-height:.98;letter-spacing:-.02em;margin-bottom:24px}
.hero .role{font-family:var(--display);font-weight:500;font-size:clamp(18px,2.4vw,26px);color:var(--text);margin-bottom:20px}
.hero .intro{max-width:52ch;color:var(--muted);font-size:clamp(15px,1.5vw,17px)}
.links{display:flex;flex-wrap:wrap;gap:10px 28px;margin-top:30px}
.links a{font-size:15px;font-weight:600;color:var(--text);padding-bottom:3px;border-bottom:1px solid var(--accent);transition:opacity .2s ease}
.links a:hover,.links a:focus-visible{opacity:.75}

/* ===== フィルター ===== */
.gallery-wrap{max-width:var(--maxw);margin:0 auto;padding:clamp(48px,7vw,80px) 24px 120px}
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:40px}
.filter{font-family:var(--body);font-size:14px;font-weight:500;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:8px 18px;cursor:pointer;transition:all .18s ease}
.filter:hover{color:var(--text);border-color:var(--text)}
.filter[aria-pressed="true"]{color:var(--on-accent);background:var(--accent);border-color:var(--accent);font-weight:700}

/* ===== グリッド ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:clamp(20px,3vw,36px)}
.card{display:block;width:100%;text-align:left;background:none;border:none;padding:0;cursor:pointer;color:inherit;font:inherit;opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s ease}
.card.in{opacity:1;transform:none}
.card[hidden]{display:none}
.thumb{position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:var(--surface-2);border:1px solid var(--line);transition:border-color .2s ease,transform .3s ease}
.card:hover .thumb,.card:focus-visible .thumb{border-color:var(--accent);transform:translateY(-4px)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease,filter .3s ease;filter:saturate(.95) brightness(.92)}
.card:hover .thumb img{transform:scale(1.04);filter:none}
.thumb iframe{width:100%;height:100%;border:0;display:block}
.play{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.play span{width:62px;height:62px;border-radius:50%;background:rgba(85,38,93,.55);backdrop-filter:blur(4px);border:1px solid rgba(255,250,245,.35);display:grid;place-items:center;transition:background .2s ease,transform .2s ease}
.card:hover .play span{background:var(--accent);transform:scale(1.08)}
.play svg{width:20px;height:20px;margin-left:3px;fill:var(--text)}
.card:hover .play svg{fill:var(--on-accent)}
.meta{padding:16px 4px 0}
.meta .cat{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.meta h3{font-family:var(--display);font-weight:700;font-size:18px;margin-top:7px;line-height:1.3}

/* ===== Contact ページ（左：プロフィール／右：フォーム） ===== */
.contact-wrap{max-width:1000px;margin:0 auto;padding:clamp(64px,10vw,110px) 24px 120px}
.contact-narrow{max-width:640px}
.subnav{display:flex;flex-wrap:wrap;gap:24px;margin-bottom:52px;font-size:14px}
.subnav a{color:var(--muted);font-weight:500;padding-bottom:3px;border-bottom:1px solid transparent;transition:color .2s ease,border-color .2s ease}
.subnav a:hover,.subnav a:focus-visible{color:var(--text)}
.subnav a[aria-current="page"]{color:var(--text);font-weight:600;border-bottom-color:var(--accent)}
.back{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);margin-bottom:48px;transition:color .2s ease}
.back:hover,.back:focus-visible{color:var(--text)}
.contact-grid{display:grid;grid-template-columns:300px 1fr;gap:clamp(40px,6vw,72px);align-items:start}

/* プロフィール */
.profile .avatar{width:150px;height:150px;border-radius:50%;overflow:hidden;border:2px solid var(--accent);background:var(--surface-2);margin-bottom:24px}
.profile .avatar img{width:100%;height:100%;object-fit:cover;display:block}
.profile .p-role{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:10px}
.profile h3{font-family:var(--display);font-weight:800;font-size:26px;line-height:1.1}

/* フォーム */
.form-col h2,.bio-col h2{font-family:var(--display);font-weight:800;font-size:clamp(36px,6vw,60px);letter-spacing:-.02em;line-height:1;margin-bottom:18px}
.bio-col .bio{color:var(--muted);font-size:16px;white-space:pre-line;line-height:1.85}
.form-col .lead{color:var(--muted);font-size:16px;margin-bottom:40px;max-width:46ch}
.field{margin-bottom:26px}
.field label{display:block;font-size:14px;font-weight:600;margin-bottom:10px}
.field .req{color:var(--accent);margin-left:6px;font-size:12px;letter-spacing:.1em}
.field input,.field textarea{width:100%;font-family:var(--body);font-size:15px;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 16px;transition:border-color .2s ease,background .2s ease}
.field textarea{min-height:150px;resize:vertical}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,250,245,.38)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:var(--surface-2)}
.submit{font-family:var(--body);font-size:16px;font-weight:700;color:var(--on-accent);background:var(--accent);border:none;border-radius:10px;padding:16px 34px;cursor:pointer;transition:opacity .2s ease,transform .1s ease}
.submit:hover{opacity:.9}
.submit:active{transform:translateY(1px)}
.form-note{margin-top:22px;font-size:13px;color:var(--muted)}
.sent{margin-top:22px;padding:16px 18px;border-radius:10px;background:var(--accent-soft);border:1px solid var(--accent);font-size:14px;display:none}
.sent.show{display:block}
.sent.error{background:rgba(255,120,120,.14);border-color:#ff8f8f;color:#ffe3e3}
.submit:disabled{opacity:.6;cursor:default}

/* ===== フッター ===== */
footer{border-top:1px solid var(--line);max-width:var(--maxw);margin:0 auto;padding:40px 24px 80px;color:var(--muted);font-size:13px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
footer a{border-bottom:1px solid var(--accent);color:var(--text)}

@media (max-width:760px){.contact-grid{grid-template-columns:1fr;gap:44px}.profile{display:flex;flex-direction:column}}
@media (max-width:560px){.grid{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}.card{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- ========== 作品一覧ページ ========== -->
<div class="page active" id="page-work">
  <header class="hero">
    <p class="eyebrow" id="eyebrow"></p>
    <h1 id="name"></h1>
    <p class="role" id="role"></p>
    <p class="intro" id="intro"></p>
    <nav class="links" aria-label="ナビゲーション"><a href="#profile">Profile</a><a href="#contact">Contact</a></nav>
  </header>
  <main class="gallery-wrap">
    <div class="filters" id="filters" role="group" aria-label="カテゴリで絞り込み"></div>
    <div class="grid" id="grid"></div>
  </main>
  <footer><span id="foot-name"></span><a href="#contact">Contact</a></footer>
</div>

<!-- ========== Profile ページ ========== -->
<div class="page" id="page-profile">
  <div class="contact-wrap">
    <nav class="subnav" aria-label="ページ切り替え">
      <a href="#">← 作品一覧</a>
      <a href="#profile" data-route="#profile">Profile</a>
      <a href="#contact" data-route="#contact">Contact</a>
    </nav>
    <div class="contact-grid">
      <!-- 左：アイコン -->
      <aside class="profile">
        <div class="avatar"><img id="p-avatar" alt="プロフィール画像"></div>
        <p class="p-role" id="p-role"></p>
        <h3 id="p-name"></h3>
      </aside>
      <!-- 右：本文 -->
      <section class="bio-col">
        <h2>Profile</h2>
        <div class="bio" id="p-bio"></div>
      </section>
    </div>
  </div>
</div>

<!-- ========== Contact ページ ========== -->
<div class="page" id="page-contact">
  <div class="contact-wrap contact-narrow">
    <nav class="subnav" aria-label="ページ切り替え">
      <a href="#">← 作品一覧</a>
      <a href="#profile" data-route="#profile">Profile</a>
      <a href="#contact" data-route="#contact">Contact</a>
    </nav>
    <section class="form-col">
      <h2>Contact</h2>
      <p class="lead">お仕事のご相談・ご依頼はこちらのフォームからお気軽にご連絡ください。すべての項目にご記入をお願いします。</p>
      <form id="contact-form" novalidate>
          <div class="field">
            <label for="cf-name">お名前<span class="req">必須</span></label>
            <input type="text" id="cf-name" name="name" placeholder="Your Name" required>
          </div>
          <div class="field">
            <label for="cf-email">メールアドレス<span class="req">必須</span></label>
            <input type="email" id="cf-email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label for="cf-message">ご相談内容<span class="req">必須</span></label>
            <textarea id="cf-message" name="message" placeholder="ご依頼内容やご予算、希望納期などをご記入ください。" required></textarea>
          </div>
          <button type="submit" class="submit">送信する</button>
          <p class="form-note">送信ボタンを押すと、入力内容がそのまま送信されます。折り返しご連絡いたします。</p>
          <div class="sent" id="sent"></div>
        </form>
      </section>
  </div>
</div>

/* ============================================================

function getId(input){
  if(!input) return "";
  const s = input.trim();
  if(/^[\w-]{11}$/.test(s)) return s;
  const m = s.match(/(?:youtu\.be\/|v=|\/embed\/|\/shorts\/|\/v\/)([\w-]{11})/);
  return m ? m[1] : s;
}

// フィルター（All + 指定ジャンルを常に表示）
const filtersEl = document.getElementById("filters");
let active = "All";
["All", ...CATEGORIES].forEach(c => {
  const b = document.createElement("button");
  b.className = "filter";
  b.textContent = c === "All" ? "すべて" : c;
  b.setAttribute("aria-pressed", c === "All" ? "true" : "false");
  b.addEventListener("click", () => {
    active = c;
    filtersEl.querySelectorAll(".filter").forEach(x => x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    applyFilter();
  });
  filtersEl.appendChild(b);
});

// グリッド
const grid = document.getElementById("grid");
const cards = [];
VIDEOS.forEach(v => {
  const id = getId(v.url);
  const card = document.createElement("button");
  card.className = "card";
  card.dataset.cat = v.category || "";
  card.setAttribute("aria-label", (v.title || "動画") + " を再生");
  card.innerHTML = `
    <div class="thumb">
      <img loading="lazy" alt="${(v.title||"").replace(/"/g,"&quot;")}"
           src="https://i.ytimg.com/vi/${id}/maxresdefault.jpg"
           onerror="this.onerror=null;this.src='https://i.ytimg.com/vi/${id}/hqdefault.jpg'">
      <span class="play"><span><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></span>
    </div>
    <div class="meta">
      ${v.category ? `<div class="cat">${v.category}</div>` : ""}
      <h3>${v.title || ""}</h3>
    </div>`;
  card.addEventListener("click", () => {
    const thumb = card.querySelector(".thumb");
    thumb.innerHTML = `<iframe allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen
      src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0"></iframe>`;
  });
  grid.appendChild(card);
  cards.push(card);
});

function applyFilter(){
  cards.forEach(c => { c.hidden = !(active === "All" || c.dataset.cat === active); });
}

// スクロールで順に出現
const io = new IntersectionObserver((entries) => {
  entries.forEach((e,i) => {
    if(e.isIntersecting){
      e.target.style.transitionDelay = (i % 3) * 80 + "ms";
      e.target.classList.add("in");
      io.unobserve(e.target);
    }
  });
}, { threshold: .1 });
cards.forEach(c => io.observe(c));

// ページ切り替え（作品一覧 / Profile / Contact）
const pages = {
  "#profile": document.getElementById("page-profile"),
  "#contact": document.getElementById("page-contact"),
};
const pageWork = document.getElementById("page-work");
function route(){
  const hash = location.hash;
  const target = pages[hash];
  pageWork.classList.toggle("active", !target);
  Object.entries(pages).forEach(([h,el]) => el.classList.toggle("active", h === hash));
  document.querySelectorAll(".subnav a[data-route]").forEach(a => {
    if(a.getAttribute("data-route") === hash) a.setAttribute("aria-current","page");
    else a.removeAttribute("aria-current");
  });
  window.scrollTo(0,0);
}
window.addEventListener("hashchange", route);
route();

// Contact フォーム送信（Web3Forms 経由・メールアドレスはコードに出ません）
const form = document.getElementById("contact-form");
const sentBox = document.getElementById("sent");
const submitBtn = form.querySelector(".submit");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if(!form.reportValidity()) return;
  submitBtn.disabled = true;
  submitBtn.textContent = "送信中…";
  sentBox.classList.remove("show","error");
  const payload = {
    access_key: ACCESS_KEY,
    subject: "ポートフォリオからのお問い合わせ",
    name: document.getElementById("cf-name").value.trim(),
    email: document.getElementById("cf-email").value.trim(),
    message: document.getElementById("cf-message").value.trim(),
  };
  try {
    const res = await fetch("https://api.web3forms.com/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(payload),
    });
    const out = await res.json();
    if(out.success){
      form.reset();
      sentBox.textContent = "送信しました。お問い合わせありがとうございます。";
      sentBox.classList.add("show");
    } else {
      throw new Error(out.message || "failed");
    }
  } catch(err){
    sentBox.textContent = "送信に失敗しました。少し時間をおいて、もう一度お試しください。";
    sentBox.classList.add("show","error");
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "送信する";
  }
});
</script>
